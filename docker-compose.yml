services:
  neo4j:
    image: neo4j:5.26
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt (driver)
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
    healthcheck:
      # api waits until this passes, so it never starts before the DB is ready
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  api:
    build: .                    # build the image from ./Dockerfile
    container_name: graphrag-api
    ports:
      - "8000:8000"
    env_file:
      - .env                    # brings in OPENAI_API_KEY, model names, etc.
    environment:
      # CRITICAL: inside the container, Neo4j is reachable by its SERVICE NAME,
      # not localhost. This overrides NEO4J_URI from .env.
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      neo4j:
        condition: service_healthy
